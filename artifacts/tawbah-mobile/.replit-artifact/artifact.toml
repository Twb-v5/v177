kind = "mobile"
previewPath = "/tawbah-mobile/"
title = "دليل التوبة النصوح - موبايل"
version = "1.0.0"
id = "artifacts/tawbah-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/tawbah-mobile/" ]
localPort = 24800

[services.development]
run = "pnpm --filter @workspace/tawbah-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tawbah-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tawbah-mobile", "run", "serve" ]

[services.env]
PORT = "24800"
BASE_PATH = "/tawbah-mobile/"
EXPO_PUBLIC_API_BASE_URL = "https://6ad17247-6023-4f43-a94f-02a8917a2e73-00-38r582jk3iikr.janeway.replit.dev/api"
